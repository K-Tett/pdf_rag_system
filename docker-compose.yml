services:
  # Vector Database for document embeddings
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO

  # Local LLM server
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: pdf_rag_backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - API_KEY=${API_KEY:-pdf-rag-secret-key}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - qdrant
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Web Interface (Primary User Interface)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: pdf_rag_frontend
    ports:
      - "8501:8501"  # Main access point for users
    environment:
      - BACKEND_URL=http://backend:8000
      - API_KEY=${API_KEY:-pdf-rag-secret-key}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  qdrant_storage:
  ollama_data:

# Quick Start Instructions:
# 1. Copy .env.example to .env 
# 2. Optionally add your OPENAI_API_KEY to .env
# 3. Run: docker-compose up -d
# 4. Wait for startup, then open: http://localhost:8501
# 5. Upload PDFs and start chatting!