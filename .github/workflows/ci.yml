name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
          - 6334:6334
        env:
          QDRANT__SERVICE__HTTP_PORT: 6333
          QDRANT__SERVICE__GRPC_PORT: 6334
        options: >-
          --health-cmd "curl -f http://localhost:6333/health || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential curl
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Create test directories
      run: |
        mkdir -p data logs
    
    - name: Wait for Qdrant to be ready
      run: |
        echo "Waiting for Qdrant to start..."
        for i in {1..60}; do
          if curl -f http://localhost:6333/health >/dev/null 2>&1; then
            echo "Qdrant is ready!"
            break
          fi
          echo "Attempt $i: Qdrant not ready yet, waiting..."
          sleep 2
        done
        
        # Final check
        if ! curl -f http://localhost:6333/health; then
          echo "Qdrant health check failed after 2 minutes"
          docker logs $(docker ps -q --filter ancestor=qdrant/qdrant:latest) || true
          exit 1
        fi
    
    - name: Run unit tests
      env:
        QDRANT_URL: http://localhost:6333
        API_KEY: test-api-key
        ENVIRONMENT: test
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-fail-under=70
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: github.ref == 'refs/heads/main'
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black==24.* isort==5.* flake8==7.* mypy==1.*
        # Install project dependencies for type checking
        pip install -r requirements.txt
    
    - name: Create missing __init__.py files
      run: |
        find src -type d -exec touch {}/__init__.py \;
        find tests -type d -exec touch {}/__init__.py \;
    
    - name: Run Black (formatting)
      run: |
        echo "Checking code formatting with Black..."
        python -m black --check --diff src/ tests/ || {
          echo "Code formatting issues found. Run 'black src/ tests/' to fix them."
          exit 1
        }
    
    - name: Run isort (import sorting)
      run: |
        echo "Checking import sorting with isort..."
        python -m isort --check-only --diff src/ tests/ || {
          echo "Import sorting issues found. Run 'isort src/ tests/' to fix them."
          exit 1
        }
    
    - name: Run flake8 (linting)
      run: |
        echo "Running flake8 linting..."
        python -m flake8 src/ tests/ \
          --max-line-length=100 \
          --extend-ignore=E203,W503,E501 \
          --exclude=__pycache__,*.egg-info,.venv,venv \
          --show-source \
          --statistics || {
          echo "Linting issues found. Please fix the issues above."
          exit 1
        }
    
    - name: Run mypy (type checking)
      run: |
        echo "Running mypy type checking..."
        python -m mypy src/ \
          --ignore-missing-imports \
          --disable-error-code=import-untyped \
          --no-strict-optional \
          --show-error-codes \
          --pretty || {
          echo "Type checking issues found. Please fix the issues above."
          exit 1
        }

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install security tools
      run: |
        pip install safety==3.* bandit[toml]==1.*
    
    - name: Run safety (dependency vulnerability scan)
      run: |
        pip install -r requirements.txt
        echo "Running safety check..."
        safety check --json --output safety-report.json || {
          echo "Security vulnerabilities found in dependencies"
          cat safety-report.json
          exit 1
        }
    
    - name: Run bandit (security linting)
      run: |
        echo "Running bandit security scan..."
        bandit -r src/ -f json -o bandit-report.json || {
          echo "Security issues found in code"
          cat bandit-report.json
          exit 1
        }
    
    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata (tags, labels)
      id: meta-backend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-backend.outputs.tags }}
        labels: ${{ steps.meta-backend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
    
    - name: Extract metadata for frontend
      id: meta-frontend
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.frontend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta-frontend.outputs.tags }}
        labels: ${{ steps.meta-frontend.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Compose
      run: |
        docker-compose --version
    
    - name: Create test environment file
      run: |
        cat > .env << EOF
        OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        API_KEY=test-integration-key
        ENVIRONMENT=test
        QDRANT_URL=http://qdrant:6333
        EOF
    
    - name: Start services with retries
      run: |
        echo "Starting Qdrant service..."
        docker-compose up -d qdrant
        
        # Wait for Qdrant with better error handling
        echo "Waiting for Qdrant to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:6333/health >/dev/null 2>&1; then
            echo "Qdrant is ready!"
            break
          fi
          echo "Attempt $i: Waiting for Qdrant..."
          sleep 3
        done
        
        if ! curl -f http://localhost:6333/health; then
          echo "Qdrant failed to start"
          docker-compose logs qdrant
          exit 1
        fi
        
        echo "Starting backend service..."
        docker-compose up -d backend
        sleep 30
    
    - name: Wait for backend service
      run: |
        echo "Waiting for backend to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:8000/health >/dev/null 2>&1; then
            echo "Backend is ready!"
            break
          fi
          echo "Attempt $i: Waiting for backend..."
          sleep 2
        done
        
        if ! curl -f http://localhost:8000/health; then
          echo "Backend failed to start"
          docker-compose logs backend
          exit 1
        fi
    
    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        
        # Test health endpoint
        echo "Testing health endpoint..."
        curl -f -H "Authorization: Bearer test-integration-key" \
             -H "Content-Type: application/json" \
             http://localhost:8000/health | jq .
        
        # Test document listing endpoint
        echo "Testing documents endpoint..."
        curl -f -H "Authorization: Bearer test-integration-key" \
             http://localhost:8000/documents/ | jq .
        
        echo "✅ Integration tests passed!"
    
    - name: Cleanup
      if: always()
      run: |
        echo "Cleaning up containers..."
        docker-compose down -v --remove-orphans
        docker system prune -f

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, lint, security, build, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy notification
      run: |
        echo "Deploying to production..."
        echo "Image tags:"
        echo "- Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:latest"
        echo "- Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:latest"
    
    # Add your deployment steps here
    # Examples:
    # - Deploy to Kubernetes
    # - Deploy to cloud provider
    # - Update docker-compose on server
    # - Trigger deployment webhook
    
    - name: Deployment placeholder
      run: |
        echo "Add your deployment steps here"
        echo "This could include:"
        echo "- Updating Kubernetes manifests"
        echo "- Deploying to cloud services"
        echo "- Running database migrations"
        echo "- Health checks after deployment"

  notification:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [test, lint, security, build]
    if: always()
    
    steps:
    - name: Notify success
      if: ${{ needs.test.result == 'success' && needs.lint.result == 'success' && needs.security.result == 'success' && needs.build.result == 'success' }}
      run: |
        echo "✅ All checks passed!"
    
    - name: Notify failure
      if: ${{ needs.test.result == 'failure' || needs.lint.result == 'failure' || needs.security.result == 'failure' || needs.build.result == 'failure' }}
      run: |
        echo "Some checks failed!"
        echo "Test result: ${{ needs.test.result }}"
        echo "Lint result: ${{ needs.lint.result }}"
        echo "Security result: ${{ needs.security.result }}"
        echo "Build result: ${{ needs.build.result }}"